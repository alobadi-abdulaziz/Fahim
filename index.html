<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مترجم لغة الإشارة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0f;
    --surface:  #16161a;
    --surface2: #1e1e24;
    --border:   #2a2a32;
    --accent:   #4f8aff;
    --accent-dim: rgba(79,138,255,0.12);
    --text:     #e8e8f0;
    --text-sub: #6b6b80;
    --success:  #3ecf8e;
    --danger:   #ff5050;
    --radius:   16px;
    --radius-sm:10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
  }
  header h1 { font-size: 15px; font-weight: 500; }
  .status {
    margin-right: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-sub);
  }
  .dot-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
  }

  /* ── Chat ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Empty state ── */
  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; color: var(--text-sub); text-align: center;
    margin: auto;
  }
  .empty .icon { font-size: 52px; opacity: 0.25; }
  .empty p { font-size: 14px; line-height: 1.8; }

  /* ── Messages ── */
  .msg {
    display: flex; flex-direction: column; gap: 5px;
    max-width: 78%;
    animation: fadeUp 0.22s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px; line-height: 1.65;
  }
  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-left-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
  }
  .meta { font-size: 11px; color: var(--text-sub); padding: 0 4px; }

  /* ── Tags ── */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: 12px; padding: 3px 11px;
    border-radius: 99px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(79,138,255,0.25);
  }
  .tag.miss {
    background: rgba(255,80,80,0.08);
    color: var(--danger);
    border-color: rgba(255,80,80,0.2);
  }

  /* ── Video ── */
  .video-wrap {
    margin-top: 12px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    max-width: 380px;
  }
  .video-wrap video { width: 100%; display: block; }

  /* ── Typing ── */
  .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
  .dot { width: 6px; height: 6px; background: var(--text-sub); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Input bar ── */
  #bar {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  #inp {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit; font-size: 14px;
    padding: 11px 15px;
    resize: none; outline: none;
    min-height: 44px; max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.18s;
  }
  #inp:focus { border-color: var(--accent); }
  #inp::placeholder { color: var(--text-sub); }

  .btn {
    width: 44px; height: 44px;
    border: none; border-radius: var(--radius-sm);
    cursor: pointer; display: grid; place-items: center;
    font-size: 17px; transition: all 0.15s; flex-shrink: 0;
  }
  #sendBtn { background: var(--accent); color: #fff; }
  #sendBtn:hover { background: #3a74ee; transform: scale(1.05); }
  #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #voiceBtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  #voiceBtn:hover { border-color: var(--accent); color: var(--accent); }
  #voiceBtn.recording {
    background: rgba(255,80,80,0.12);
    border-color: var(--danger); color: var(--danger);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
</style>
</head>
<body>

<header>
  <div class="logo">🤟</div>
  <h1>مترجم لغة الإشارة</h1>
  <div class="status">
    <div class="dot-status"></div>
    <span>متصل</span>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <div class="icon">🤟</div>
    <p>اكتب جملة أو استخدم الميكروفون<br>وسيتم تحويلها إلى فيديو لغة إشارة فوراً</p>
  </div>
</div>

<div id="bar">
  <button class="btn" id="voiceBtn" title="تسجيل صوتي">🎤</button>
  <textarea id="inp" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
  <button class="btn" id="sendBtn" title="إرسال">➤</button>
</div>

<script>
const chat     = document.getElementById('chat');
const inp      = document.getElementById('inp');
const sendBtn  = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const empty    = document.getElementById('empty');

inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

sendBtn.addEventListener('click', send);

function now() {
  return new Date().toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
}

function hideEmpty() { empty.style.display = 'none'; }

function addMsg(role, html) {
  hideEmpty();
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `<div class="bubble">${html}</div><div class="meta">${now()}</div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function addTyping() {
  hideEmpty();
  const el = document.createElement('div');
  el.className = 'msg bot typing';
  el.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function buildBotHTML(matched, notFound, videoUrl) {
  const matchTags = matched.map(w => `<span class="tag">${w}</span>`).join('');
  const missTags  = notFound.length
    ? `<div style="margin-top:8px;font-size:12px;color:#ff7070;">لم يُوجد لها مقابل:</div>
       <div class="tags">${notFound.map(w => `<span class="tag miss">${w}</span>`).join('')}</div>`
    : '';
  const video = videoUrl
    ? `<div class="video-wrap">
         <video src="${videoUrl}?t=${Date.now()}" autoplay controls playsinline></video>
       </div>`
    : '';

  return `<div style="font-size:13px;color:var(--text-sub);margin-bottom:4px;">الكلمات المترجمة</div>
          <div class="tags">${matchTags}</div>
          ${missTags}
          ${video}`;
}

async function send() {
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  sendBtn.disabled = true;

  addMsg('user', text);
  const typing = addTyping();

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    typing.remove();

    if (!res.ok) {
      addMsg('bot', `⚠️ ${data.error || 'حدث خطأ'}`);
    } else {
      addMsg('bot', buildBotHTML(data.matched, data.not_found || [], data.video_url));
    }
  } catch {
    typing.remove();
    addMsg('bot', '⚠️ تعذر الاتصال بالسيرفر');
  }

  sendBtn.disabled = false;
  inp.focus();
}

// ── Voice ──
let recording = false;

voiceBtn.addEventListener('click', async () => {
  if (recording) return;
  recording = true;
  voiceBtn.classList.add('recording');
  voiceBtn.textContent = '⏹';

  try {
    const res  = await fetch('/voice', { method: 'POST' });
    const data = await res.json();

    if (data.text) {
      inp.value = data.text;
      inp.style.height = 'auto';
      inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
      inp.focus();
    } else {
      addMsg('bot', '⚠️ لم يُتعرف على الصوت، حاول مرة أخرى');
    }
  } catch {
    addMsg('bot', '⚠️ خطأ في التسجيل');
  }

  recording = false;
  voiceBtn.classList.remove('recording');
  voiceBtn.textContent = '🎤';
});
</script>
</body>
</html>
